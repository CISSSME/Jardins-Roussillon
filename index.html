*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Lato', sans-serif; }

/* HEADER */
header {
  position: fixed; top: 0; left: 0; right: 0; height: 76px;
  background: var(--navy); border-bottom: 3px solid var(--orange);
  display: flex; align-items: center; padding: 0 0 0 26px; gap: 16px; z-index: 1000;
}
.brand { display:flex; align-items:center; gap:14px; cursor:pointer; }
.brand:hover { opacity:.85; }
.brand:focus-visible { outline:2px solid var(--orange); outline-offset:3px; border-radius:6px; }
@keyframes brandTap { 0% { transform:scale(1); } 35% { transform:scale(.92); } 100% { transform:scale(1); } }
.brand.tapped .logo-img { animation: brandTap .4s ease; }
@media (prefers-reduced-motion: reduce) { .brand.tapped .logo-img { animation: none; } .sidebar-toggle { animation: none; } }
.logo-img { width: 48px; height: 48px; border-radius: 9px; object-fit: cover; flex-shrink: 0; }
.logo-text { color: #fff; }
.logo-text strong { font-family: 'Raleway', sans-serif; font-size: 17px; font-weight: 700; display: block; }
.logo-text span { font-size: 13px; font-weight: 300; opacity: .6; letter-spacing: .04em; text-transform: uppercase; }
.header-right { margin-left: auto; display: flex; gap: 10px; align-items: center; padding-right: 12px; }
.btn-info { display: inline-flex; align-items: center; justify-content: center;
  width: 35px; height: 35px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,.45); color: #fff; text-decoration: none;
  font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 700; font-size: 18px;
  line-height: 1; transition: background .15s, border-color .15s; }
.btn-info:hover { background: rgba(255,255,255,.14); border-color: #fff; }
.btn-install { background: var(--orange); color: #fff; font-family: 'Raleway', sans-serif;
  font-size: 13.5px; font-weight: 700; padding: 9px 16px; border-radius: 7px; border: none;

/* SIDEBAR */

.sb-close { display: none; position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border: none; background: transparent; color: var(--muted); font-size: 22px; line-height: 1; cursor: pointer; border-radius: 8px; z-index: 1; }

.fav-toggle { margin-top: 10px; display: inline-flex; align-items: center; gap: 5px;

.cmp-export-btn { margin-top: 8px; display: none; align-items: center; justify-content: center; gap: 6px; width: 100%;
  padding: 9px 12px; border-radius: 8px; border: 1.5px solid var(--navy); background: var(--navy); color: #fff;

.sb-item:hover { background: #f5f2ec; }
.sb-item.active { background: var(--blue-lt); border-left: 3px solid var(--blue); }

.sb-num { width: 30px; height: 30px; border-radius: 50%; background: var(--rls, var(--navy2)); color: #fff;

/* sélection indiquée par la bande bleue de l'item ; le rond garde sa couleur RLS */

.sb-name { font-family: 'Raleway', sans-serif; font-weight: 600; font-size: 17px;

/* MAP */
#map { flex: 1; cursor: default; }
.leaflet-control-attribution.author-credit { font-size: 10px; color: var(--muted);

.locate-ctrl a { display: flex; align-items: center; justify-content: center; color: var(--navy); }

.user-loc-icon { background: transparent; border: none; }
.user-loc-dot { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px;

}

/* MARKER NUMBER */
.pin-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  transform: rotate(45deg); color: #fff; font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 11px; }

/* DETAIL PANEL (READ-ONLY VIEWER) */
.detail { position: fixed; top: 76px; right: 0; bottom: 0; width: 480px;
  background: var(--white); border-left: 1px solid var(--border);
  box-shadow: -6px 0 30px rgba(0,0,0,.1); z-index: 960;
  display: flex; flex-direction: column; overflow: hidden;
  transform: translateX(100%); transition: transform .35s cubic-bezier(.4,0,.2,1); }
.detail.open { transform: translateX(0); }
.dp-head { background: var(--navy); color: #fff; padding: 14px 18px;
  flex-shrink: 0; border-bottom: 3px solid var(--orange); position: relative; }
.dp-close { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2); border-radius: 6px; width: 26px; height: 26px;
  color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.dp-tag { font-family:'Raleway',sans-serif; font-size:12px; font-weight:700; letter-spacing:.1em;
  text-transform:uppercase; color:var(--orange); margin-bottom:4px; }

/* DISPLAY SECTIONS */
.vw-sec { padding: 14px 18px 0; }
.vw-sec-title { font-family:'Raleway',sans-serif; font-weight:700; font-size:13px;

.vw-row { display:flex; gap:10px; margin-bottom:9px; align-items:baseline; }

.vw-value { flex:1; font-size:14.5px; color:var(--navy2); word-break: break-word; }
.vw-value a { color: var(--blue); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .15s; }
.vw-value a:hover { border-bottom-color: var(--blue); }
.info-dot { display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px;
  border-radius:50%; border:1px solid var(--muted); background:none; color:var(--muted);
  font:italic 11px/1 Georgia, serif; cursor:pointer; padding:0; vertical-align:middle; margin-left:4px; }
.info-dot:hover { border-color:var(--orange); color:var(--orange); }
.niveau-explain { display:none; margin:4px 0 9px; padding:10px 12px; background:var(--cream);
  border:1px solid var(--border); border-radius:8px; font-size:12.5px; line-height:1.5; color:var(--navy2); }

/* Horaire grid */
.hor-grid { display:grid; grid-template-columns:auto 1fr; gap:4px 14px; }
.hor-day { font-size:14px; color:var(--muted); }
.hor-val { font-size:14px; color:var(--navy2); font-weight:600; }
.hor-val.ferme { color:#b8b1a0; font-weight:400; }

/* Staff grid */
.staff-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.staff-cell { background:var(--cream); border:1px solid var(--border); border-radius:8px;
  padding:8px 10px; display:flex; align-items:center; gap:8px; }
.staff-icon { font-size:16px; }
.staff-count { font-family:'Raleway',sans-serif; font-weight:700; font-size:15px; color:var(--navy2); min-width:22px; }
.staff-count.empty { color:#c9c1ad; }
.staff-label { font-size:13px; color:var(--muted); line-height:1.3; }

/* NOTES (editable + saved locally) */
.notes-sec { padding: 14px 18px 0; }
.notes-textarea { width:100%; border:1px solid var(--border); border-radius:8px;
  padding:8px 10px; font-size:14px; font-family:'Lato',sans-serif; background:var(--cream);
  resize:vertical; min-height:90px; line-height:1.5; }
.notes-textarea:focus { outline:none; border-color:var(--blue); background:#fff; }

/* Save bar */
.save-bar { padding:12px 18px; background:var(--cream); border-top:1px solid var(--border);
  display:flex; gap:10px; align-items:center; flex-shrink:0; }
.btn-save { flex:1; background:var(--blue); color:#fff; border:none; border-radius:7px;
  padding:10px; font-size:12px; font-family:'Raleway',sans-serif; font-weight:700; letter-spacing:.04em;
  cursor:pointer; }
.btn-save:hover { background:#2b6caa; }
.save-msg { font-size:12px; color:var(--green); display:none; align-items:center; gap:4px; white-space:nowrap; }
.save-msg.show { display:flex; }

/* scrollbar */
.dp-body::-webkit-scrollbar, .sb-list::-webkit-scrollbar { width:4px; }
.dp-body::-webkit-scrollbar-thumb, .sb-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.sidebar-toggle {
  display: none;
  position: fixed; left: 0; top: 50%; transform: translateY(-50%);
  z-index: 940; background: var(--navy); color: #fff;
  animation: sbPeek 6s ease-in-out 2s infinite; will-change: transform;
  border: none; border-left: 3px solid var(--orange);
  border-radius: 0 14px 14px 0; padding: 24px 11px; cursor: pointer;
  font-family: 'Raleway', sans-serif;
  font-weight: 700; font-size: 15px; letter-spacing: .12em; text-transform: uppercase;
  box-shadow: 2px 0 12px rgba(0,0,0,.25);
}
.sidebar-toggle:hover, .sidebar-toggle:focus-visible { background: var(--navy2); animation-play-state: paused; }
.sidebar-toggle.hidden { display: none !important; }
.sb-dots { display: flex; gap: 2px; line-height: 0; }
.sb-label { writing-mode: vertical-rl; }
.sb-dots i { width: 5px; height: 5px; border-radius: 50%; background: currentColor; display: block;
  animation: sbDotHop 5s ease-in-out infinite; will-change: transform; }
.sidebar-toggle:not(.hidden) .sb-dots i { animation-play-state: running; }
.sb-dots i:nth-child(2) { animation-delay: .14s; }
.sb-dots i:nth-child(3) { animation-delay: .28s; }
@keyframes sbPeek {
  0%, 8%   { transform: translateY(-50%) translateX(0); }
  3%       { transform: translateY(-50%) translateX(9px); }
  6%       { transform: translateY(-50%) translateX(4px); }
  9%       { transform: translateY(-50%) translateX(7px); }
  12%,100% { transform: translateY(-50%) translateX(0); }
}
@keyframes sbDotHop {
  0% { transform: translateY(0); }
  3% { transform: translateY(-6px); }
  7%, 100% { transform: translateY(0); }
}
.sidebar-overlay {
  display: none; position: fixed; inset: 76px 0 0 0;
  background: rgba(15,34,64,.4); z-index: 945;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
.sidebar-overlay.show { opacity: 1; pointer-events: auto; }

@media (max-width: 860px) {
  .detail { width: 100%; }
  .sidebar {
    display: flex; position: fixed; top: 76px; left: 0; bottom: 0;
    width: 86%; max-width: 360px; z-index: 950;
    transform: translateX(-100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow: 4px 0 24px rgba(0,0,0,.28);
  }
  .sidebar.open { transform: translateX(0); }
  .sb-close { display: block; }
  .sidebar-toggle { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .sidebar-overlay { display: block; }
}

/* ===== ÉCRAN DE CHARGEMENT ===== */
#app-loader { position: fixed; inset: 0; z-index: 4000; background: var(--navy); overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: space-between;
  padding: 13vh 0 10vh; transition: opacity .6s ease; }
#app-loader.hide { opacity: 0; pointer-events: none; }
#app-loader .ldr-grid { position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.055) 1px, transparent 1px); background-size: 34px 34px; }
#app-loader .ldr-glow { position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 42%, rgba(238,45,98,.14), transparent 60%); }
#app-loader .ldr-top { position: relative; display: flex; flex-direction: column; align-items: center; gap: 14px; }
#app-loader .ldr-logo { width: 94px; height: 94px; border-radius: 50%;
  background: var(--app-logo) center/cover; box-shadow: 0 12px 30px rgba(238,45,98,.5);
  animation: ldrReveal .6s ease both; }
#app-loader .ldr-brand { font-family: 'Raleway', sans-serif; font-weight: 800; letter-spacing: .14em;
  text-transform: uppercase; font-size: 17px; color: #fff; animation: ldrUp .6s ease both .15s; }
#app-loader .ldr-sub { font-size: 13px; letter-spacing: .14em; color: #9fb0c4; margin-top: -8px;
  animation: ldrUp .6s ease both .25s; }
#app-loader .ldr-map { position: relative; width: 240px; height: 190px; }
#app-loader .ldr-pin { position: absolute; width: 32px; height: 32px; border: 3px solid #fff;
  border-radius: 50% 50% 50% 0; transform-origin: bottom right; box-shadow: 0 6px 13px rgba(0,0,0,.32);
  animation: ldrPop .55s cubic-bezier(.34,1.56,.64,1) both; }
#app-loader .ldr-pin::after { content: ''; position: absolute; top: 7.5px; left: 7.5px; width: 11px; height: 11px;
  background: #fff; border-radius: 50%; transform: rotate(45deg); }
#app-loader .pin-rose { background: var(--orange); left: 50px; top: 16px; animation-delay: .4s; }
#app-loader .pin-green { background: #15803d; left: 150px; top: 66px; animation-delay: 1s; }
#app-loader .pin-blue { background: #2F4A7A; left: 88px; top: 124px; animation-delay: 1.6s; }
#app-loader .ldr-bar-wrap { width: 190px; text-align: center; }
#app-loader .ldr-track { width: 100%; height: 6px; border-radius: 4px; background: rgba(255,255,255,.15); overflow: hidden; }
#app-loader .ldr-fill { display: block; height: 100%; width: 0; border-radius: 4px;
  background: linear-gradient(90deg, var(--orange), #f5b301); animation: ldrFill 2.2s ease-in-out both; }
#app-loader .ldr-cap { display: block; font-size: 12px; letter-spacing: .05em; color: #9fb0c4; margin-top: 12px; }
@keyframes ldrReveal { 0%{transform:scale(.4);opacity:0} 60%{transform:scale(1.06);opacity:1} 100%{transform:scale(1)} }
@keyframes ldrUp { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
@keyframes ldrPop { 0%{transform:rotate(-45deg) scale(0)} 100%{transform:rotate(-45deg) scale(1)} }
@keyframes ldrFill { 0%{width:0} 100%{width:100%} }
@media (prefers-reduced-motion: reduce) {
  #app-loader * { animation-duration: .01ms !important; }
}
.toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(16px);
  background: var(--navy); color: #fff; padding: 13px 18px; border-radius: 12px;

.report-link { display: inline-block; margin-top: 12px; font-size: 12.5px; color: var(--muted);

.dp-pdf-btn { padding:9px 14px; border-radius:8px; border:1.5px solid var(--border); background:#fff; color:var(--navy2); font-family:'Raleway',sans-serif; font-weight:700; font-size:13.5px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; white-space:nowrap; }

/* ===== Fiche imprimable (PDF) ===== */
#cmp-print .fp-doc { color:#1a3558; font-family:'Lato',Helvetica,Arial,sans-serif; }
#cmp-print .fp-head { border-bottom:3px solid var(--orange); padding-bottom:10px; margin-bottom:14px; }
#cmp-print .fp-eyebrow { color:var(--orange); font-size:13px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; font-family:'Raleway',sans-serif; }
#cmp-print .fp-title { color:var(--navy); font-size:28px; font-weight:800; line-height:1.05; margin:3px 0 2px; font-family:'Raleway',sans-serif; }
#cmp-print .fp-sub { color:var(--muted); font-size:13px; }
#cmp-print .fp-body .dp-actions, #cmp-print .fp-body .dp-report-wrap, #cmp-print .fp-body .notes-sec, #cmp-print .fp-body .info-dot { display:none !important; }
/* ===== Comparatif des favoris (PDF) ===== */
#cmp-print { position:fixed; left:-10000px; top:0; width:1000px; background:#fff; color:#1a3558; font-family:'Lato',Helvetica,Arial,sans-serif; }
#cmp-print.cmp-show { position:fixed; left:0; top:0; width:100%; height:100%; z-index:5000; overflow:auto; }
body.cmp-open { overflow:hidden; }
#cmp-print .cmp-bar { display:none; }
#cmp-print.cmp-show .cmp-bar { display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:5; background:var(--navy); padding:11px 14px; box-shadow:0 2px 10px rgba(15,34,64,.18); }
#cmp-print.cmp-show .cmp-bar-t { margin-right:auto; color:#fff; font-family:'Raleway',sans-serif; font-weight:700; font-size:14.5px; }
#cmp-print.cmp-show .cmp-bar button { font-family:'Raleway',sans-serif; font-weight:700; font-size:14px; border:none; border-radius:9px; padding:9px 15px; cursor:pointer; }
#cmp-print.cmp-show .cmp-bar .b-print { background:var(--orange); color:#fff; }
#cmp-print.cmp-show .cmp-bar .b-close { background:rgba(255,255,255,.16); color:#fff; }
#cmp-print.cmp-show .cmp-inner { max-width:1040px; margin:0 auto; padding:24px 22px 44px; }
#cmp-print .cmp-header { border-bottom:3px solid var(--orange); padding-bottom:10px; margin-bottom:13px; }
#cmp-print .cmp-eyebrow { color:var(--orange); font-size:16px; font-weight:800; letter-spacing:.20em; font-family:'Raleway',sans-serif; }
#cmp-print .cmp-title { color:var(--navy); font-size:32px; font-weight:800; line-height:1.04; margin:4px 0 3px; letter-spacing:.02em; font-family:'Raleway',sans-serif; }
#cmp-print .cmp-subtitle { color:var(--muted); font-size:13px; }
#cmp-print .cmp-exp { color:#8a8270; font-size:10.5px; margin-top:5px; }
#cmp-print .cmp-headrow { width:100%; border-collapse:collapse; }
#cmp-print .cmp-headrow td { border:none; vertical-align:bottom; padding:0; }
#cmp-print .cmp-headqr { display:none; width:130px; text-align:right; vertical-align:top; }
#cmp-print .cmp-headqr img { width:84px; height:84px; }
#cmp-print .cmp-headqr-cap { color:var(--muted); font-size:8px; line-height:1.3; margin-top:3px; }
#cmp-print .cmp-table { width:100%; border-collapse:collapse; table-layout:fixed; }
#cmp-print .cmp-table th, #cmp-print .cmp-table td { border:1px solid #e7e1d3; padding:5.5px 10px; text-align:left; vertical-align:top; word-break:break-word; }
#cmp-print .cmp-clhead { background:#fff; padding-top:7px; padding-bottom:7px; }
#cmp-print .cmp-clname { font-size:12px; font-weight:800; color:var(--navy); line-height:1.15; font-family:'Raleway',sans-serif; }
#cmp-print .cmp-cltype { font-size:9px; font-weight:700; color:var(--orange); letter-spacing:.07em; text-transform:uppercase; margin-top:2px; }
#cmp-print .cmp-rl { background:#f3efe6; color:var(--navy); font-size:10.5px; font-weight:700; width:140px; }
#cmp-print .cmp-table td { font-size:10.5px; color:#1a3558; }
#cmp-print .cmp-alt { background:#faf8f3; }
#cmp-print th.cmp-rl.cmp-alt { background:#efeadd; }
#cmp-print .cmp-corner { background:#2F4A7A; border-color:#2F4A7A; width:140px; }
#cmp-print .cmp-table td.cmp-sect { background:#2F4A7A; color:#fff; font-size:9.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; padding:5px 10px; border-color:#2F4A7A; }
#cmp-print .cmp-dot { display:inline-block; width:8px; height:8px; border-radius:50%; vertical-align:middle; margin-right:5px; }
#cmp-print .cmp-chip { display:inline-block; color:#fff; font-size:8.5px; font-weight:700; padding:2px 6px; border-radius:18px; margin:0 3px 3px 0; }
#cmp-print .cmp-tbd { color:#a79f8c; font-style:italic; }
#cmp-print .cmp-ferme { color:#b0a892; }
#cmp-print .cmp-dash { color:#c9c1ad; }
#cmp-print .cmp-botbar { width:100%; border-collapse:collapse; margin-top:16px; border-top:1px solid var(--border); }
#cmp-print .cmp-botbar td { vertical-align:middle; padding-top:14px; }
#cmp-print .cmp-qrcell { width:114px; }
#cmp-print .cmp-qrcell img { width:106px; height:106px; }
#cmp-print .cmp-qrtitle { color:var(--navy); font-size:14px; font-weight:800; font-family:'Raleway',sans-serif; }
#cmp-print .cmp-qrsub { color:var(--muted); font-size:11.5px; margin-top:3px; }
#cmp-print .cmp-qrurl { color:var(--orange); font-size:11.5px; font-weight:700; margin-top:4px; }
#cmp-print .cmp-note { color:#8a8270; font-size:8.5px; margin-top:9px; line-height:1.5; }
#cmp-print.cmp-dense .cmp-headqr { display:table-cell; }
#cmp-print.cmp-dense .cmp-botbar { display:none; }
#cmp-print.cmp-dense .cmp-header { padding-bottom:7px; margin-bottom:9px; }
#cmp-print.cmp-dense .cmp-eyebrow { font-size:13px; }
#cmp-print.cmp-dense .cmp-title { font-size:23px; }
#cmp-print.cmp-dense .cmp-subtitle { font-size:11px; }
#cmp-print.cmp-dense .cmp-exp { font-size:9px; margin-top:3px; }
#cmp-print.cmp-dense .cmp-clname { font-size:11px; }
#cmp-print.cmp-dense .cmp-headqr img { width:76px; height:76px; }
#cmp-print.cmp-dense .cmp-table th, #cmp-print.cmp-dense .cmp-table td { padding:2.5px 8px; }
#cmp-print.cmp-dense .cmp-rl, #cmp-print.cmp-dense .cmp-table td { font-size:9.5px; }
#cmp-print.cmp-dense td.cmp-sect { padding:3px 8px; font-size:9px; }
#cmp-print.cmp-dense .cmp-note { font-size:8px; margin-top:7px; }
@media print {
  @page { margin:1.4cm; }
  html, body { height:auto !important; min-height:0 !important; overflow:visible !important; background:#fff !important; }

  /* ---- Impression d'une FICHE ---- */
  body.print-fiche header, body.print-fiche .sidebar, body.print-fiche #map,
  body.print-fiche .leaflet-control-container, body.print-fiche .sidebar-toggle,
  body.print-fiche #cmp-print { display:none !important; }
  body.print-fiche .layout { display:block !important; height:auto !important; padding:0 !important; }
  body.print-fiche #detail { display:flex !important; position:static !important; transform:none !important;
    left:auto !important; top:auto !important; right:auto !important; bottom:auto !important;
    width:100% !important; height:auto !important; max-height:none !important;
    box-shadow:none !important; border:none !important; overflow:visible !important; }
  body.print-fiche .dp-body { overflow:visible !important; height:auto !important; }
  body.print-fiche .dp-head { background:#fff !important; color:#0f2240 !important; border-bottom:2px solid #0f2240 !important; }
  body.print-fiche .dp-name-display { color:#0f2240 !important; }
  body.print-fiche .dp-tag { color:#ee2d62 !important; }
  body.print-fiche #dp-close, body.print-fiche .dp-actions, body.print-fiche .dp-report-wrap,
  body.print-fiche .notes-sec, body.print-fiche .niveau-explain, body.print-fiche .info-dot { display:none !important; }
  body.print-fiche .prat-chip, body.print-fiche .rls-dot { -webkit-print-color-adjust:exact; print-color-adjust:exact; color-adjust:exact; }

  /* ---- Impression COMPARATIF / FICHE (conteneur #cmp-print) ---- */
  /* Masque absolument tout sauf le conteneur d'impression */
  body.print-cmp > * { display:none !important; }
  body.print-cmp #cmp-print { display:block !important; position:static !important; left:auto !important; top:auto !important;
    right:auto !important; bottom:auto !important; width:100% !important; height:auto !important; max-height:none !important;
    overflow:visible !important; z-index:auto !important; background:#fff !important; }
  body.print-cmp #cmp-print .cmp-bar { display:none !important; }
  body.print-cmp #cmp-print .cmp-inner { max-width:none !important; margin:0 !important; padding:0 !important; }
  body.print-cmp #cmp-print, body.print-cmp #cmp-print * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; color-adjust:exact !important; }
}
</style>

<script>
// ═══════════════════════════════════════════
//  DONNÉES
// ═══════════════════════════════════════════
let gmfs = [];
let order = [];
let favOrder = [];
let dataMeta = {};
let favoris = new Set();
let favOnly = false;
let pratFilter = new Set();
let searchQuery = '';
let annonceFermee = false; // fermeture de la bannière pour la session courante seulement
let notesDirty = false; // vrai si le champ notes a été modifié sans sauvegarde

// ── Stockage local (notes personnelles + ordre du classement) ──
const SAFE = {
  get(k){ try { return localStorage.getItem(k); } catch(e){ return null; } },
  set(k,v){ try { localStorage.setItem(k,v); return true; } catch(e){ return false; } }
};
const NOTE_KEY  = id => 'gmf-pb-note-' + id;
const ORDER_KEY = 'gmf-pb-ordre';
const FAVORDER_KEY = 'gmf-pb-ordre-favoris';
const FAV_KEY   = 'gmf-pb-favoris';
const ANNONCE_KEY = 'gmf-pb-annonce-fermee';

// (notes, ordre et marqueurs sont initialisés dans initData(), après le chargement de data.json)

const byId = id => gmfs.find(g => g.id === id);
const normTxt = s => (s == null ? '' : String(s)).toLowerCase().replace(/\u0153/g, 'oe').replace(/\u00e6/g, 'ae').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
function matchesFilters(id) {
  if (favOnly && !favoris.has(id)) return false;
  if (searchQuery) {
    const g = byId(id);
    const hay = normTxt([g && g.nom, g && g.alias, g && g.ville, g && g.type].filter(Boolean).join(' '));
    if (!hay.includes(searchQuery)) return false;
  }
  if (pratFilter.size) {
    const g = byId(id);
    const ps = Array.isArray(g && g.pratiques) ? g.pratiques : [];
    if (!ps.some(c => pratFilter.has(c))) return false;
  }
  return true;
}
const rankOf = id => currentOrder().indexOf(id) + 1;

// ═══════════════════════════════════════════
//  CARTE
// ═══════════════════════════════════════════
const HOME = { center:[45.30,-73.57], zoom:10 };
const map = L.map('map', { center:HOME.center, zoom:HOME.zoom, zoomControl:false });
L.control.zoom({ position:'topright' }).addTo(map);

// Bouton « Me localiser » (sous les boutons de zoom)
let userMarker = null;
const LocateControl = L.Control.extend({
  options: { position: 'topright' },
  onAdd: function () {
    const c = L.DomUtil.create('div', 'leaflet-bar locate-ctrl');
    const a = L.DomUtil.create('a', '', c);
    a.href = '#';
    a.title = 'Me localiser';
    a.setAttribute('role', 'button');
    a.setAttribute('aria-label', 'Me localiser sur la carte');
    a.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="6.5"/><line x1="12" y1="1.5" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.5"/><line x1="1.5" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22.5" y2="12"/><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/></svg>';
    L.DomEvent.on(a, 'click', function (e) { L.DomEvent.stop(e); map.locate({ setView: true, maxZoom: 14, enableHighAccuracy: true }); });
    L.DomEvent.disableClickPropagation(c);
    return c;
  }
});
map.addControl(new LocateControl());
map.on('locationfound', function (e) {
  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.marker(e.latlng, {
    icon: L.divIcon({
      className: 'user-loc-icon',
      html: '<span class="user-loc-pulse"></span><span class="user-loc-dot"></span>',
      iconSize: [14, 14], iconAnchor: [7, 7]
    }),
    interactive: false, keyboard: false
  }).addTo(map);
});
function showToast(msg) {
  let t = document.getElementById('app-toast');
  if (!t) { t = document.createElement('div'); t.id = 'app-toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  requestAnimationFrame(function () { t.classList.add('show'); });
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(function () { t.classList.remove('show'); }, 4500);
}
map.on('locationerror', function () {
  showToast("Localisation impossible. Vérifiez que l'accès à votre position est autorisé dans votre navigateur.");
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CartoDB | © Olivier Laplante', maxZoom:19
}).addTo(map);

// Légende des couleurs par RLS
let legendEl = null;
const legend = L.control({ position:'bottomleft' });
legend.onAdd = function(){
  const d = L.DomUtil.create('div', 'rls-legend');
  d.innerHTML =
    '<div class="rls-legend-title">Type de clinique</div>' +
    '<div class="rls-legend-row"><span class="rls-dot" style="background:#2563eb"></span>GMF</div>' +
    '<div class="rls-legend-row"><span class="rls-dot" style="background:#0ea5e9"></span>GMF satellite</div>' +
    '<div class="rls-legend-row"><span class="rls-dot" style="background:#7c3aed"></span>GMF-U</div>' +
    '<div class="rls-legend-row"><span class="rls-dot" style="background:#0d9488"></span>GMF-R</div>' +
    '<div class="rls-legend-row"><span class="rls-dot" style="background:#b91c1c"></span>CH</div>';
  L.DomEvent.disableClickPropagation(d);
  legendEl = d;
  return d;
};
legend.addTo(map);

let activeId = null;
const markers = {};

  'GMF': '#2563eb',
  'GMF satellite': '#0ea5e9',
  'GMF-U': '#7c3aed',
  'GMF-R': '#0d9488',
  'CH': '#b91c1c',
  'CLSC': '#15803d',
  'Clinique': '#ea580c',
  'Clinique médicale': '#ea580c'
};
function typeColor(t) { return TYPE_COLORS[t] || '#0f2240'; }

const TYPE_LABELS = {
  'GMF': 'Groupe de Médecine Familiale',
  'GMF satellite': 'GMF satellite',
  'GMF-U': 'Groupe de Médecine Familiale Universitaire',
  'GMF-R': 'Groupe de Médecine Familiale – Réseau',
  'CH': 'Centre hospitalier',
  'CLSC': 'CLSC',
  'Clinique': 'Clinique médicale',
  'Clinique médicale': 'Clinique médicale'
};
function typeLabel(t) { return TYPE_LABELS[t] || t || ''; }

function makeIcon(active, rank, type) {
  const c = typeColor(type);
  const size = active ? 26 : 20;
  const border = active ? '#0f2240' : '#fff';
  const bw = active ? 3 : 2.5;
  return L.divIcon({ className:'',

    iconSize:[size,size], iconAnchor:[size/2,size], popupAnchor:[0,-size-2] });
}

function refreshMarkerIcons() {
  gmfs.forEach(g => markers[g.id].setIcon(makeIcon(g.id === activeId, rankOf(g.id), g.type)));
}

function buildMarkers() {
  gmfs.forEach(g => {
    const m = L.marker([g.lat, g.lng], { icon:makeIcon(false, rankOf(g.id), g.type), draggable:false }).addTo(map);
    m.bindTooltip(`<b>${esc(g.nom.trim())}</b><br><small>${esc(g.ville)}</small>`, { direction:'top', offset:[0,-20] });
    m.on('click', (e) => { L.DomEvent.stopPropagation(e); toggleDetail(g.id); });
    markers[g.id] = m;
  });
}

const sbList = document.getElementById('sb-list');

// Ordre des favoris : ceux déjà rangés, puis les nouveaux (ordre par défaut)
function favListOrder() {
  const inFav = favOrder.filter(id => favoris.has(id) && gmfs.some(g => g.id === id));
  const rest = order.filter(id => favoris.has(id) && !inFav.includes(id));
  return inFav.concat(rest);
}
function currentOrder() { return favOnly ? favListOrder() : order; }

function renderSidebar() {
  sbList.innerHTML = '';
  let shown = 0;
  const list = currentOrder();
  const dragEnabled = favOnly;
  list.forEach((id, i) => {
    const g = byId(id);
    if (!matchesFilters(id)) return;
    shown++;
    const parenMatch = g.nom.trim().match(/^(.*?)\s*(\(.*\))\s*$/);
    const nomMain = parenMatch ? parenMatch[1] : g.nom.trim();
    const el = document.createElement('div');
    el.className = 'sb-item' + (id === activeId ? ' active' : '');
    el.id = 'si-' + id;
    el.draggable = dragEnabled;
    el.innerHTML = `${dragEnabled ? '<span class="sb-grip" title="Glisser pour reclasser">⠿</span>' : ''}
      <div class="sb-num" style="--rls:${typeColor(g.type)}">${i+1}</div>
      <div class="sb-info">
        <div class="sb-name">${esc(nomMain)}</div>
        <div class="sb-city">📍 ${esc(g.ville)}</div>
      </div>
      <button class="sb-star${favoris.has(id) ? ' fav' : ''}" title="Marquer comme favori" aria-label="Favori" draggable="false">${favoris.has(id) ? '★' : '☆'}</button>`;

    const starEl = el.querySelector('.sb-star');
    if (starEl) {
      starEl.addEventListener('click', e => { e.stopPropagation(); toggleFav(id); });
      starEl.addEventListener('dragstart', e => { e.preventDefault(); e.stopPropagation(); });
    }

    el.addEventListener('click', () => { if (justDragged) return; toggleDetail(id); });

    if (dragEnabled) {
    el.addEventListener('dragstart', e => {
      dragSrcId = id; el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(id)); // requis par Firefox
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.sb-item').forEach(x => x.classList.remove('drag-over'));
      justDragged = true; setTimeout(() => justDragged = false, 60);
    });
    el.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('drag-over');
      if (dragSrcId === null || dragSrcId === id) return;
      let fo = favListOrder().filter(x => x !== dragSrcId);
      const targetIdx = fo.indexOf(id);
      fo.splice(targetIdx, 0, dragSrcId);
      favOrder = fo;
      SAFE.set(FAVORDER_KEY, JSON.stringify(favOrder));
      renderSidebar();
      refreshMarkerIcons();
    });
    }

    sbList.appendChild(el);
  });
  if (shown === 0 && (favOnly || pratFilter.size || searchQuery)) {
    sbList.innerHTML = '<div class="sb-empty">' + (searchQuery
      ? 'Aucune clinique ne correspond à votre recherche.'
      : favOnly
      ? 'Aucune clinique en favori.<br>Touchez l\'étoile ☆ d\'une clinique pour l\'ajouter ici.'
      : 'Aucune clinique ne correspond aux pratiques sélectionnées.') + '</div>';
  }
  updateCmpButton();
}

const esc = s => (s == null ? '' : String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'));

function siteLink(url) {
  if (!url) return 'À venir';
  const safe = esc(url);
  const pretty = esc(url.replace(/^https?:\/\//,'').replace(/\/$/,''));
  return `<a href="${safe}" target="_blank" rel="noopener">${pretty}</a>`;
}
function contactLink(c) {
  if (!c) return 'À venir';
  c = c.trim();
  const reMail = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
  // Sépare sur la virgule, le point-virgule ou l'espace : rend chaque courriel cliquable
  const parts = c.split(/[,;]+|\s+/).map(p => p.trim()).filter(Boolean);
  if (parts.length && parts.every(p => reMail.test(p)))
    return parts.map(p => `<a href="mailto:${esc(p)}">${esc(p)}</a>`).join(', ');
  return esc(c);
}
function telLink(phone) {
  if (!phone) return 'À venir';
  const digits = phone.replace(/[^\d+]/g, '');
  return `<a href="tel:${digits}">${esc(phone)}</a>`;
}
function mapsLink(g) {
  if (!g.adresse) return 'À venir';
  const query = encodeURIComponent(g.nom.trim() + ', ' + g.adresse);
  const url = 'https://www.google.com/maps/search/?api=1&query=' + query;
  return `<a href="${url}" target="_blank" rel="noopener" title="Ouvrir dans Google Maps">${esc(g.adresse)}</a>`;
}

function toggleFav(id) {
  if (favoris.has(id)) favoris.delete(id); else favoris.add(id);

  const f = favoris.has(id);

    star.classList.toggle('fav', f);

function cmpVal(v) { return (v && String(v).trim()) ? esc(v) : '<span class="cmp-tbd">À venir</span>'; }
function cmpHor(v) {
  if (!v || !String(v).trim()) return '<span class="cmp-tbd">À venir</span>';
  if (/ferm/i.test(v)) return '<span class="cmp-ferme">' + esc(v) + '</span>';
  return esc(v);
}
function cmpPers(v) { return (v && String(v).trim()) ? esc(v) : '<span class="cmp-dash">—</span>'; }
function cmpNote(v) { return (v && String(v).trim()) ? esc(v).replace(/\n/g, '<br>') : '<span class="cmp-dash">Aucune note</span>'; }
function cmpChips(codes) {
  if (!codes || !codes.length) return '<span class="cmp-tbd">À venir</span>';
  return codes.map(c => { const p = PRATIQUES.find(x => x.code === c); return p ? `<span class="cmp-chip" style="background:${p.color}">${p.abbr}</span>` : ''; }).join('');
}

function buildComparatif(favs) {
  const gs = favs.map(id => byId(id)).filter(Boolean);
  const JOURS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
  const date = new Date().toLocaleDateString('fr-CA', { day:'numeric', month:'long', year:'numeric' });
  let head = '<th class="cmp-corner"></th>';
  gs.forEach(g => {
    head += `<th class="cmp-clhead" style="border-top:6px solid ${typeColor(g.type)}"><div class="cmp-clname">${esc(g.nom.trim())}</div><div class="cmp-cltype">${esc(typeLabel(g.type))}</div></th>`;
  });
  let shade = 0;
  const row = (label, render) => {
    const cls = (shade++ % 2 === 0) ? 'cmp-alt' : '';
    let tds = ''; gs.forEach(g => { tds += `<td class="${cls}">${render(g)}</td>`; });
    return `<tr><th class="cmp-rl ${cls}">${label}</th>${tds}</tr>`;
  };
  const sect = (label) => { shade = 0; return `<tr><td class="cmp-sect" colspan="${gs.length + 1}">${label}</td></tr>`; };
  let rows = '';
  rows += row('Réseau (RLS)', g => `<span class="cmp-dot" style="background:${typeColor(g.type)}"></span>${cmpVal(g.rls)}`);
  rows += row('Niveau GMF', g => cmpVal(g.niveau));
  rows += row('Ville', g => cmpVal(g.ville));
  rows += row('Pratique', g => cmpChips(g.pratiques));
  rows += row('Bureau', g => cmpVal(g.bureau));
  rows += row('Frais de bureau', g => cmpVal(g.frais));
  rows += row('DMÉ', g => cmpVal(g.dme));
  rows += row('Portes ouvertes', g => cmpVal(g.porteOuverte));
  rows += sect("Horaire d'ouverture");
  JOURS.forEach(j => { rows += row(j, g => cmpHor((g.horaire || {})[j] || '')); });
  rows += sect('Personnel clinique');
  staffDefs.forEach(sd => {
    const present = gs.some(g => { const v=(g.personnel||{})[sd.key]; return v && String(v).trim()!==''; });
    if (present) rows += row(sd.lbl, g => cmpPers((g.personnel || {})[sd.key] || ''));
  });
  rows += sect('Notes personnelles');
  rows += row('', g => cmpNote(g.notes));
  const html = `
    <div class="cmp-header">
      <table class="cmp-headrow"><tr>
        <td class="cmp-headmain">
          <div class="cmp-eyebrow">COMPARATIF</div>
          <div class="cmp-title">FAVORIS</div>
          <div class="cmp-subtitle">Recrutement médical — RLS de Jardins-Roussillon</div>
          <div class="cmp-exp">Exporté le ${date}</div>
        </td>
        <td class="cmp-headqr">
          <img src="${QR_DATA}" alt="Code QR vers l'application">
          <div class="cmp-headqr-cap">Carte interactive<br>cisssme.github.io/Jardins-Roussillon</div>
        </td>
      </tr></table>
    </div>
    <table class="cmp-table"><tr>${head}</tr>${rows}</table>
    <table class="cmp-botbar"><tr>
      <td class="cmp-qrcell"><img src="${QR_DATA}" alt="Code QR vers l'application"></td>
      <td>
        <div class="cmp-qrtitle">Carte interactive des cliniques en recrutement</div>
        <div class="cmp-qrsub">Scannez ce code pour ouvrir l'application et explorer toutes les cliniques.</div>
        <div class="cmp-qrurl">cisssme.github.io/Jardins-Roussillon</div>
      </td>
    </tr></table>
    <div class="cmp-note">Carte des cliniques en recrutement, CISSS de la Montérégie-Ouest</div>`;
  document.getElementById('cmp-print').innerHTML =
    '<div class="cmp-bar">' +
      '<span class="cmp-bar-t">Comparatif des favoris</span>' +
      '<button type="button" class="b-print" onclick="cmpPrint()">\u2913 Imprimer / Enregistrer en PDF</button>' +
      '<button type="button" class="b-close" onclick="cmpClose()">\u2715 Fermer</button>' +
    '</div><div class="cmp-inner">' + html + '</div>';
  return gs.length;
}

function exportComparatif() {
  const all = favListOrder();
  if (all.length < 2) return;
  const favs = all.slice(0, 4);
  const n = buildComparatif(favs);
  const cp = document.getElementById('cmp-print');
  const landscape = n >= 4;
  if (cp) cp.classList.toggle('cmp-dense', landscape);
  const os = document.getElementById('cmp-orient');
  if (os) os.textContent = '@page { size: Letter ' + (landscape ? 'landscape' : 'portrait') + '; margin: 1.1cm; }';
  if (all.length > 4 && cp) {
    const t = cp.querySelector('.cmp-bar-t');
    if (t) t.textContent = 'Comparatif \u2014 4 premiers favoris (sur ' + all.length + ')';
  }
  if (cp) { cp.classList.add('cmp-show'); cp.scrollTop = 0; }
  document.body.classList.add('cmp-open');
}

function fichePrint() {

function cmpPrint() {
  document.body.classList.remove('print-fiche');

function cmpClose() {
  const cp = document.getElementById('cmp-print');
  if (cp) { cp.classList.remove('cmp-show', 'cmp-dense'); cp.innerHTML = ''; }
  const os = document.getElementById('cmp-orient'); if (os) os.textContent = '';
  document.body.classList.remove('cmp-open', 'print-cmp', 'print-fiche');
}

function buildPratFilter() {
  const wrap = document.getElementById('prat-filter');

  wrap.innerHTML = '';
  PRATIQUES.forEach(p => {
    const b = document.createElement('button');
    b.type = 'button'; b.className = 'pf-chip'; b.textContent = p.abbr;
    b.title = p.label; b.setAttribute('aria-label', 'Filtrer : ' + p.label);
    b.style.setProperty('--c', p.color);
    b.addEventListener('click', () => {
      if (pratFilter.has(p.code)) pratFilter.delete(p.code); else pratFilter.add(p.code);

// ═══════════════════════════════════════════
//  CHARGEMENT DES DONNÉES (data.json)
// ═══════════════════════════════════════════
function annonceContenu() {
  const a = dataMeta.annonce;
  if (!a) return { texte:'', lien:'', lienCarte:'' };
  if (typeof a === 'string') return { texte:a, lien:'', lienCarte:'' };
  return { texte: a.texte || '', lien: a.lien || '', lienCarte: a.lienCarte || '' };
}
function showBanner() {
  const banner = document.getElementById('annonce-banner');
  if (!banner) return;
  const { texte, lien, lienCarte } = annonceContenu();
  if (!texte || annonceFermee) { banner.style.display = 'none'; return; }
  document.getElementById('annonce-text').textContent = texte.replace(/([.!?])\s+/g, '$1\n');
  const linkEl = document.getElementById('annonce-link');
  if (lien) { linkEl.href = lien; linkEl.style.display = ''; } else { linkEl.style.display = 'none'; }
  const mapEl = document.getElementById('annonce-map');
  if (lienCarte) { mapEl.href = lienCarte; mapEl.style.display = ''; } else { mapEl.style.display = 'none'; }
  banner.style.display = 'block';
}

function showUpdateDate() {
  const el = document.getElementById('maj-date');
  if (!el) return;
  if (dataMeta && dataMeta.miseAJour) {
    const d = new Date(dataMeta.miseAJour + 'T00:00:00');
    const fmt = isNaN(d.getTime()) ? dataMeta.miseAJour
      : d.toLocaleDateString('fr-CA', { year:'numeric', month:'long', day:'numeric' });
    el.textContent = 'Données mises à jour le ' + fmt;
  } else {
    el.textContent = '';
  }
}

function initData(data) {
  gmfs = Array.isArray(data) ? data : (data.cliniques || []);
  dataMeta = Array.isArray(data) ? {} : (data || {});

  // Notes personnelles sauvegardées
  gmfs.forEach(g => { const n = SAFE.get(NOTE_KEY(g.id)); if (n !== null) g.notes = n; });

  // Ordre de la liste principale : toujours l'ordre par défaut (RLS puis alphabétique), non réordonnable
  const typeRank = { 'GMF-U': 0, 'GMF-R': 1, 'GMF': 2, 'GMF satellite': 3, 'CH': 4 };
  order = gmfs.slice().sort((a, b) => {
    const ra = typeRank[a.type] ?? 99, rb = typeRank[b.type] ?? 99;
    if (ra !== rb) return ra - rb;
    return (a.nom || '').localeCompare(b.nom || '', 'fr', { sensitivity: 'base' });
  }).map(g => g.id);

  // Favoris (étoiles) sauvegardés
  favoris = new Set();
  try {
    const f = JSON.parse(SAFE.get(FAV_KEY) || '[]');
    if (Array.isArray(f)) favoris = new Set(f);
  } catch(e) {}

  // Ordre des favoris (sauvegardé). Migration : à défaut, on récupère l'ancien ordre de liste filtré aux favoris.
  favOrder = [];
  try {
    const sf = JSON.parse(SAFE.get(FAVORDER_KEY) || 'null');
    if (Array.isArray(sf)) favOrder = sf.filter(id => gmfs.some(g => g.id === id));
  } catch(e) {}
  if (favOrder.length === 0) {
    try {
      const old = JSON.parse(SAFE.get(ORDER_KEY) || 'null');
      if (Array.isArray(old)) favOrder = old.filter(id => favoris.has(id));
    } catch(e) {}
  }

  buildMarkers();
  renderSidebar();
  showUpdateDate();
  showBanner();
}

fetch('./data.json', { cache: 'no-cache' })
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(initData)
  .catch(err => {
    console.error('Chargement de data.json impossible :', err);
    const el = document.getElementById('maj-date');
    if (el) el.textContent = '\u26a0 Données indisponibles (vérifiez data.json)';
  });
</script>

<script>
// Bouton d'installation visible (PWA)
(function () {
  var btn = document.getElementById('btn-install');
  var tip = document.getElementById('ios-tip');
  var tipMsg = document.getElementById('ios-tip-msg');
  var tipClose = document.getElementById('ios-tip-close');
  var deferred = null;

  var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if (standalone) { return; } // déjà installée : on n'affiche rien

  function showTip(msg) { tipMsg.innerHTML = msg; tip.classList.add('show'); }
  if (tipClose) tipClose.addEventListener('click', function () { tip.classList.remove('show'); });

  // Android / Chrome / Edge : on capte l'invite native du navigateur
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    deferred = e;
    btn.classList.add('show');
  });

  // iPhone / iPad : pas d'invite native, on montre quand même le bouton
  if (isIOS) btn.classList.add('show');

  btn.addEventListener('click', async function () {
    if (deferred) {
      deferred.prompt();
      try { await deferred.userChoice; } catch (e) {}
      deferred = null;
      btn.classList.remove('show');
    } else if (isIOS) {
      showTip("Pour installer\u00a0: touchez le bouton <b>Partager</b> \u2b06\ufe0f en bas de Safari, puis <b>\u00ab Sur l\u2019\u00e9cran d\u2019accueil \u00bb</b>.");
    } else {
      showTip("Pour installer\u00a0: ouvrez le menu de votre navigateur (\u22ee) puis choisissez <b>\u00ab Installer l\u2019application \u00bb</b>.");
    }
  });

  window.addEventListener('appinstalled', function () {
    btn.classList.remove('show');
    tip.classList.remove('show');
  });
})();
</script>

<script>
(function () {
  var start = Date.now(), done = false;
  function hideLoader() {
    if (done) return; done = true;
    var el = document.getElementById('app-loader');
    if (!el) return;
    var wait = Math.max(0, 2500 - (Date.now() - start)); // minimum 2,5 secondes
    setTimeout(function () {
      el.classList.add('hide');
      setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 700);
    }, wait);
  }
  if (document.readyState === 'complete') hideLoader();
  else window.addEventListener('load', hideLoader);
  setTimeout(hideLoader, 7000); // filet de sécurité
})();
</script>
